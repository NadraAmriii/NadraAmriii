name: Generate profile images

on:
  schedule:
    - cron: "0 */12 * * *" # every 12 hours
  workflow_dispatch: # manual button
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 1. GitHub Stats (was 503 paused, now generated locally) ----
      - name: Generate stats.svg
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=NadraAmriii&show_icons=true&theme=tokyonight&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top-langs.svg
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=NadraAmriii&layout=compact&theme=tokyonight&hide_border=true&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---- 2. Trophy (was also paused on vercel) ----
      - name: Generate trophy.svg
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: NadraAmriii
          theme: tokyonight
          no-bg: true
          margin-w: 4
          output_path: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---- 3. Bomberman ----
      - name: Generate Bomberman
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: NadraAmriii
          games: 'bomberman'

      - name: Move bomberman to profile folder
        run: |
          mkdir -p profile
          cp dist/bomberman-contribution-graph.svg profile/bomberman.svg || echo "bomberman light not found"
          cp dist/bomberman-contribution-graph-dark.svg profile/bomberman-dark.svg || true
          ls -lh profile/

      # ---- 4. Commit ----
      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: update profile images (stats, trophy, bomberman)"
            git push
          else
            echo "No changes"
          fi
